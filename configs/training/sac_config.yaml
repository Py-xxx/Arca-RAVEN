algorithm: SAC
policy: MultiInputPolicy    # Handles Dict observation space

hyperparameters:
  learning_rate: 3.0e-4
  buffer_size: 1_000_000
  learning_starts: 10_000
  batch_size: 256
  tau: 0.005               # Soft update coefficient
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  ent_coef: auto           # Automatic entropy tuning
  target_entropy: auto
  use_sde: true            # State-Dependent Exploration — better for locomotion
  sde_sample_freq: 64

policy_kwargs:
  # Multi-modal feature extractor defined in simulation/rl/policies/
  features_extractor_class: RoverMultiModalExtractor
  features_extractor_kwargs:
    lidar_embed_dim: 256
    camera_embed_dim: 128
    state_embed_dim: 64
    combined_dim: 512
  net_arch: [512, 256, 128]

curriculum:
  enabled: true
  stages:
    - name: flat_terrain
      max_steps: 500_000
      difficulty: 0.0
    - name: gentle_slopes
      max_steps: 1_000_000
      difficulty: 0.3
    - name: rocks_and_craters
      max_steps: 2_000_000
      difficulty: 0.6
    - name: full_hazard
      max_steps: 5_000_000
      difficulty: 1.0

total_timesteps: 10_000_000
eval_freq: 50_000
n_eval_episodes: 10
save_freq: 100_000
tensorboard_log: models/tensorboard/
